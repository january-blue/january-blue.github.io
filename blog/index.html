<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing · Kexin Tan</title>
  <meta name="description" content="Notes and writing by Kexin Tan." />
  <meta name="author" content="Kexin Tan" />

  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main>

    <nav class="blog-nav">
      <a href="../index.html" class="catnav" aria-label="Homepage">
        <span class="catnav__ears" aria-hidden="true">^&ensp;^</span>
        <span class="catnav__word"><span class="catnav__arrow">←</span> Homepage</span>
      </a>
    </nav>

    <header class="blog-head">
      <h1 class="blog-title">Writing</h1>
      <p class="small muted">On what I study, what I notice, and what I try to make.</p>
    </header>

    <ul class="post-list" id="post-list">
      <li class="post-list__empty muted small">Loading…</li>
    </ul>

    <footer>
      &copy; <span id="year">2026</span> Kexin Tan. Hosted on GitHub Pages.
    </footer>

  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function fmtDate(iso) {
      const d = new Date(iso + "T00:00:00");
      if (isNaN(d)) return iso;
      return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    }

    fetch("posts.json")
      .then(function (r) { return r.json(); })
      .then(function (data) {
        const list = document.getElementById("post-list");
        const posts = (data.posts || []).slice().sort(function (a, b) {
          return b.date.localeCompare(a.date);
        });
        if (posts.length === 0) {
          list.innerHTML = '<li class="post-list__empty muted small">No posts yet.</li>';
          return;
        }
        list.innerHTML = posts.map(function (p) {
          return (
            '<li class="post-item">' +
              '<a class="post-item__title" href="post.html?slug=' + encodeURIComponent(p.slug) + '">' +
                p.title +
              '</a>' +
              '<span class="post-item__date">' + fmtDate(p.date) + '</span>' +
              (p.summary ? '<span class="post-item__summary">' + p.summary + '</span>' : '') +
            '</li>'
          );
        }).join("");
      })
      .catch(function () {
        document.getElementById("post-list").innerHTML =
          '<li class="post-list__empty muted small">Could not load posts.</li>';
      });
  </script>
</body>
</html>
