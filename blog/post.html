<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing · Kexin Tan</title>
  <meta name="author" content="Kexin Tan" />

  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main>

    <nav class="blog-nav">
      <a href="index.html" class="catnav" aria-label="All writing">
        <span class="catnav__ears" aria-hidden="true">^&ensp;^</span>
        <span class="catnav__word"><span class="catnav__arrow">←</span> All Writing</span>
      </a>
    </nav>

    <article>
      <header class="post-head">
        <h1 class="post-title" id="post-title">Loading…</h1>
        <p class="post-date small muted" id="post-date"></p>
      </header>
      <div class="prose" id="post-body"></div>
    </article>

    <footer>
      &copy; <span id="year">2026</span> Kexin Tan. Hosted on GitHub Pages.
    </footer>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    function fmtDate(iso) {
      const d = new Date(iso + "T00:00:00");
      if (isNaN(d)) return iso;
      return d.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    }

    function getSlug() {
      const m = location.search.match(/[?&]slug=([^&]+)/);
      return m ? decodeURIComponent(m[1]) : null;
    }

    function fail(msg) {
      document.getElementById("post-title").textContent = "Not found";
      document.getElementById("post-body").innerHTML =
        '<p class="muted">' + msg + ' <a href="index.html">Back to all writing</a>.</p>';
    }

    const slug = getSlug();
    if (!slug || !/^[a-z0-9-]+$/i.test(slug)) {
      fail("No such post.");
    } else {
      Promise.all([
        fetch("posts.json").then(function (r) { return r.json(); }),
        fetch("posts/" + slug + ".md").then(function (r) {
          if (!r.ok) throw new Error("missing");
          return r.text();
        })
      ])
      .then(function (results) {
        const meta = (results[0].posts || []).find(function (p) { return p.slug === slug; });
        const md = results[1];

        const title = meta ? meta.title : slug;
        document.getElementById("post-title").textContent = title;
        document.title = title + " · Kexin Tan";
        if (meta && meta.date) {
          document.getElementById("post-date").textContent = fmtDate(meta.date);
        }
        document.getElementById("post-body").innerHTML = marked.parse(md);
      })
      .catch(function () {
        fail("This post could not be loaded.");
      });
    }
  </script>
</body>
</html>
